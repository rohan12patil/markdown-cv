name: Build CV

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get cache key (monthly rotation)
        id: cache-month
        run: echo "key=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ steps.cache-month.outputs.key }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-${{ steps.cache-month.outputs.key }}-
            npm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Build CV (DOCX + PDF)
        run: node scripts/build.js --pdf

      - name: Upload CV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CV
          path: |
            dist/*.docx
            dist/*.pdf
          retention-days: 60
